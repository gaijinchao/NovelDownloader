<div class="library-container">
<div class="card shadow-sm mb-4">
<div class="card-header bg-dark text-white"><h5 class="mb-0"><i class="bi bi-link-45deg"></i> 粘贴链接下载</h5></div>
<div class="card-body">
<div class="input-group">
<span class="input-group-text"><i class="bi bi-link"></i></span>
<input type="text" id="directInput" class="form-control" placeholder="粘贴书籍目录页链接，如 https://fanqienovel.com/page/7558397007656668185">
<button class="btn btn-dark" onclick="downloadDirect()"><i class="bi bi-download"></i> 下载</button>
</div>
<div class="row g-2 mt-3 align-items-center">
<div class="col-auto text-muted small">下载范围：</div>
<div class="col-auto"><div class="input-group input-group-sm"><span class="input-group-text">第</span><input type="number" id="chapterStart" class="form-control" min="1" value="1" style="max-width:5rem"><span class="input-group-text">章</span></div></div>
<div class="col-auto text-muted">—</div>
<div class="col-auto"><div class="input-group input-group-sm"><span class="input-group-text">第</span><input type="number" id="chapterEnd" class="form-control" min="0" value="10" style="max-width:5rem"><span class="input-group-text">章</span></div></div>
<div class="col-auto text-muted small">结束填 0 = 至末尾</div>
</div>
<small class="text-muted d-block mt-2">请使用 <code>/page/书籍ID</code> 链接；首次下载会自动打开浏览器登录。范围可在此临时修改，或在「设置」中保存默认值。</small>
<p class="text-muted small mb-0 mt-2" id="cookieHint"></p>
</div>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
<h5 class="text-primary mb-0"><i class="bi bi-collection"></i> 我的书库</h5>
<button id="updateAllBtn" class="btn btn-outline-dark btn-sm"><i class="bi bi-arrow-clockwise"></i> 全部更新</button>
</div>
<div class="row" id="novelList"></div>
</div>
